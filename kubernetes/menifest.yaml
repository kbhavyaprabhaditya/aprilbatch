---
# ============================================================
# Namespace – bhavyaprabhaditya
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: bhavyaprabhaditya

---
# ============================================================
# Deployment – Java Web Application
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-web-app
  namespace: bhavyaprabhaditya
  labels:
    app: java-web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-web-app
  template:
    metadata:
      labels:
        app: java-web-app
    spec:
      containers:
        - name: java-web-app
          image: 980637429038.dkr.ecr.ap-south-1.amazonaws.com/bhavyaprabhaditya-app:v3
          ports:
            - containerPort: 9090
          env:
            - name: DB_HOST
              value: "localhost"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "appdb"
            - name: REDIS_HOST
              value: "localhost"
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 10

---
# ============================================================
# Service – LoadBalancer (exposes the app via AWS ELB)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: java-web-app-service
  namespace: bhavyaprabhaditya
  labels:
    app: java-web-app
spec:
  type: LoadBalancer
  selector:
    app: java-web-app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 9090
