# SonarCloud Configuration
sonar.projectKey=kbhavyaprabhaditya_aprilbatch
sonar.organization=kbhavyaprabhaditya

# Project metadata
sonar.projectName=April Batch Java App
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=src/main/java
sonar.java.binaries=target/classes

# Encoding
sonar.sourceEncoding=UTF-8

# Java version
sonar.java.source=11
sonar.java.target=11

# Coverage exclusions (if needed)
sonar.coverage.exclusions=**/*.java

# Duplication detection settings
sonar.cpd.minimumTokens=50
sonar.cpd.minimumLines=5
