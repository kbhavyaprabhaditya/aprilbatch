version: "3.9"

# =============================================================
# Full-stack Docker Compose – Assignment
#
# Services:
#   app    – Java HTTP web server (built from source)
#   db     – MySQL 8 database
#   redis  – Redis 7 backend/cache
#
# Volumes:
#   mysql_data  – persists MySQL data across restarts
#   redis_data  – persists Redis data across restarts
#   app_logs    – persists Java app logs
# =============================================================

services:

  # -----------------------------------------------------------
  # SERVICE 1: Java Web Application
  # Built from the project's multi-stage Dockerfile.
  # Depends on db and redis being healthy before it starts.
  # -----------------------------------------------------------
  app:
    build:
      context: ..                    # repo root (where pom.xml and src/ live)
      dockerfile: docker/dockerfile
    image: bhavyaprabhaditya/assignment:latest
    container_name: java-app
    ports:
      - "9090:9090"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppassword
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - app_logs:/app/logs           # persist application logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: on-failure

  # -----------------------------------------------------------
  # SERVICE 2: MySQL Database
  # -----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql    # persist all database files
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network
    restart: unless-stopped

  # -----------------------------------------------------------
  # SERVICE 3: Redis Backend / Cache
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis-backend
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data             # persist Redis AOF/RDB snapshots
    command: redis-server --appendonly yes   # enable AOF persistence
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

# =============================================================
# Named Volumes
# =============================================================
volumes:
  mysql_data:
    name: assignment_mysql_data
  redis_data:
    name: assignment_redis_data
  app_logs:
    name: assignment_app_logs

# =============================================================
# Network
# =============================================================
networks:
  app-network:
    name: assignment-network
    driver: bridge