# ---------------------------------------------------------------
# Blue-Green Deployments
# Both deployments are managed by a single Helm release.
# Traffic is switched by changing  activeSlot  in values:
#
#   blue slot  → deployment named  <release>-blue
#   green slot → deployment named  <release>-green
#
# The Service selector always points to .Values.activeSlot.
# ---------------------------------------------------------------

{{- if .Values.blue.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "java-web-app.fullname" . }}-blue
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "java-web-app.labels" . | nindent 4 }}
    slot: blue
spec:
  replicas: {{ .Values.blue.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "java-web-app.name" . }}
      slot: blue
  template:
    metadata:
      labels:
        app: {{ include "java-web-app.name" . }}
        slot: blue
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.blue.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          env:
            - name: APP_VERSION
              value: {{ .Values.blue.tag | quote }}
            - name: DEPLOYMENT_SLOT
              value: "blue"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: {{ .Values.probes.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: {{ .Values.probes.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
{{- end }}

{{- if .Values.green.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "java-web-app.fullname" . }}-green
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "java-web-app.labels" . | nindent 4 }}
    slot: green
spec:
  replicas: {{ .Values.green.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "java-web-app.name" . }}
      slot: green
  template:
    metadata:
      labels:
        app: {{ include "java-web-app.name" . }}
        slot: green
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.green.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          env:
            - name: APP_VERSION
              value: {{ .Values.green.tag | quote }}
            - name: DEPLOYMENT_SLOT
              value: "green"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: {{ .Values.probes.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: {{ .Values.probes.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
{{- end }}
