name: CI-CD Pipeline

# -----------------------------------------------------------------
# Trigger: runs automatically when a PR is merged into main.
# Direct pushes to main are blocked by branch protection policy.
# Developers must always raise a PR.
# -----------------------------------------------------------------
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------
  # JOB 1: SonarCloud scan
  # ---------------------------------------------------------------
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed by SonarCloud

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile (needed for sonar java.binaries)
        run: mvn clean compile -q -Dmaven.compiler.source=11 -Dmaven.compiler.target=11

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  # ---------------------------------------------------------------
  # JOB 2: Build package and store artifact
  # ---------------------------------------------------------------
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

      - name: Show JAR info
        run: ls -lh target/*.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-web-app-${{ github.run_number }}
          path: target/java-web-app.jar
          retention-days: 30

  # ---------------------------------------------------------------
  # JOB 3: Build Docker image and push to Docker Hub
  # Unique tag = v<run_number>  (increments with every pipeline run)
  # ---------------------------------------------------------------
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR for Docker
        run: mvn clean package -DskipTests -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Java Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/assignment:v${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/assignment:latest

      - name: Build and push Nginx Docker image
        uses: docker/build-push-action@v5
        with:
          context: docker/
          file: docker/dockerfile-nginx
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-web:v${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-web:latest

      - name: Image summary
        run: |
          echo "Docker images pushed:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/assignment:v${{ github.run_number }}"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/nginx-web:v${{ github.run_number }}"

  # ---------------------------------------------------------------
  # JOB 4: Push to ECR and Deploy to EKS (Team2-eks-cluster1)
  # Namespace: bhavyaprabhaditya
  # Image tag = v<run_number> — new tag on every successful run
  # ---------------------------------------------------------------
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: docker

    env:
      AWS_REGION: ap-south-1
      ECR_REGISTRY: 980637429038.dkr.ecr.ap-south-1.amazonaws.com
      ECR_REPOSITORY: bhavyaprabhaditya-app
      EKS_CLUSTER: Team2-eks-cluster1
      NAMESPACE: bhavyaprabhaditya
      IMAGE_TAG: v${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Update image tag in manifest
        run: |
          sed -i "s|${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:.*|${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}|g" \
            kubernetes/menifest.yaml

      - name: Apply Kubernetes manifests
        run: kubectl apply -f kubernetes/menifest.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/java-web-app \
            -n ${{ env.NAMESPACE }} \
            --timeout=180s

      - name: Get LoadBalancer URL
        run: |
          echo "Waiting for LoadBalancer to be assigned..."
          for i in $(seq 1 12); do
            LB=$(kubectl get svc java-web-app-service \
              -n ${{ env.NAMESPACE }} \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "$LB" ]; then
              echo "Application is live at: http://${LB}"
              echo "Health check: http://${LB}/health"
              break
            fi
            echo "Attempt $i: LoadBalancer not ready yet, waiting 10s..."
            sleep 10
          done

      - name: Deployment summary
        run: |
          echo "=========================================="
          echo "  Deployment complete!"
          echo "  Cluster  : ${{ env.EKS_CLUSTER }}"
          echo "  Namespace: ${{ env.NAMESPACE }}"
          echo "  Image    : ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          echo "=========================================="
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get svc  -n ${{ env.NAMESPACE }}
