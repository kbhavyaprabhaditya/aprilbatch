name: CI-CD Pipeline

# -----------------------------------------------------------------
# Trigger: runs automatically when a PR is merged into main.
# Direct pushes to main are blocked by branch protection policy.
# Developers must always raise a PR.
# -----------------------------------------------------------------
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------
  # JOB 1: SonarCloud scan
  # ---------------------------------------------------------------
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed by SonarCloud

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile (needed for sonar java.binaries)
        run: mvn clean compile -q -Dmaven.compiler.source=11 -Dmaven.compiler.target=11

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  # ---------------------------------------------------------------
  # JOB 2: Build package and store artifact
  # ---------------------------------------------------------------
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

      - name: Show JAR info
        run: ls -lh target/*.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-web-app-${{ github.run_number }}
          path: target/java-web-app.jar
          retention-days: 30

  # ---------------------------------------------------------------
  # JOB 3: Build Docker image and push to Docker Hub
  # Unique tag = v<run_number>  (increments with every pipeline run)
  # ---------------------------------------------------------------
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR for Docker
        run: mvn clean package -DskipTests -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Java Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/assignment:v${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/assignment:latest

      - name: Build and push Nginx Docker image
        uses: docker/build-push-action@v5
        with:
          context: docker/
          file: docker/dockerfile-nginx
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-web:v${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-web:latest

      - name: Image summary
        run: |
          echo "Docker images pushed:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/assignment:v${{ github.run_number }}"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/nginx-web:v${{ github.run_number }}"

  # ---------------------------------------------------------------
  # JOB 4: Push to ECR and deploy to EKS using Helm + Blue-Green
  #
  # Blue-Green strategy:
  #   1. Build and push new image tag to ECR
  #   2. Create / update K8s secret from GitHub Secrets (no secrets in files)
  #   3. Detect current active slot (blue|green)
  #   4. Deploy new image to the INACTIVE slot (zero downtime)
  #   5. Health-check new slot pods
  #   6. Switch service selector → instant traffic cut-over
  #   7. Scale down old slot
  # ---------------------------------------------------------------
  deploy:
    name: Deploy to EKS (Helm Blue-Green)
    runs-on: ubuntu-latest
    needs: docker

    env:
      AWS_REGION: ap-south-1
      ECR_REGISTRY: 980637429038.dkr.ecr.ap-south-1.amazonaws.com
      ECR_REPOSITORY: bhavyaprabhaditya-app
      EKS_CLUSTER: Team2-eks-cluster1
      NAMESPACE: bhavyaprabhaditya
      IMAGE_TAG: v${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      # Create or update the K8s secret from GitHub Secrets.
      # --dry-run=client | kubectl apply makes this idempotent.
      # Secret values NEVER appear in any committed file.
      - name: Create / update Kubernetes Secret
        run: |
          kubectl create secret generic java-web-app-secret \
            --from-literal=DB_HOST=${{ secrets.APP_DB_HOST }} \
            --from-literal=DB_PORT=${{ secrets.APP_DB_PORT }} \
            --from-literal=DB_NAME=${{ secrets.APP_DB_NAME }} \
            --from-literal=REDIS_HOST=${{ secrets.APP_REDIS_HOST }} \
            --from-literal=REDIS_PORT=${{ secrets.APP_REDIS_PORT }} \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Blue-Green Deploy
        run: |
          set -e

          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          echo "Deploying image: $IMAGE"

          # ── Step 1: Detect current active slot ──────────────────
          CURRENT_SLOT=$(kubectl get svc java-web-app-svc \
            -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.spec.selector.slot}' 2>/dev/null || echo "none")

          if [ "$CURRENT_SLOT" = "blue" ]; then
            NEW_SLOT=green
            OLD_SLOT=blue
          else
            NEW_SLOT=blue
            OLD_SLOT=green
          fi

          echo "Current active slot: $CURRENT_SLOT  →  New slot: $NEW_SLOT"

          # ── Step 2: First-time install or normal upgrade ─────────
          if [ "$CURRENT_SLOT" = "none" ]; then
            echo "First deployment: installing blue slot..."
            helm upgrade --install java-web-app helm/java-web-app \
              --namespace ${{ env.NAMESPACE }} \
              --create-namespace \
              --set blue.enabled=true \
              --set blue.tag=${{ env.IMAGE_TAG }} \
              --set green.enabled=false \
              --set activeSlot=blue \
              --timeout=3m
          else
            # Get the current OLD slot's tag so we preserve it
            OLD_TAG=$(helm get values java-web-app \
              -n ${{ env.NAMESPACE }} \
              --output json | jq -r ".${OLD_SLOT}.tag // \"latest\"")

            # ── Step 3: Deploy new image to inactive slot ─────────
            echo "Deploying ${{ env.IMAGE_TAG }} to $NEW_SLOT slot..."
            helm upgrade java-web-app helm/java-web-app \
              --namespace ${{ env.NAMESPACE }} \
              --reuse-values \
              --set ${NEW_SLOT}.enabled=true \
              --set ${NEW_SLOT}.tag=${{ env.IMAGE_TAG }} \
              --set ${OLD_SLOT}.enabled=true \
              --set ${OLD_SLOT}.tag=${OLD_TAG} \
              --set activeSlot=${OLD_SLOT} \
              --timeout=3m

            # ── Step 4: Health-check new pods ────────────────────
            echo "Waiting for $NEW_SLOT rollout..."
            kubectl rollout status deployment/java-web-app-${NEW_SLOT} \
              -n ${{ env.NAMESPACE }} --timeout=120s

            NEW_POD=$(kubectl get pods -n ${{ env.NAMESPACE }} \
              -l "slot=${NEW_SLOT}" -o jsonpath='{.items[0].metadata.name}')
            echo "Health-checking pod: $NEW_POD"
            kubectl exec -n ${{ env.NAMESPACE }} ${NEW_POD} -- \
              wget -qO- http://localhost:9090/health

            # ── Step 5: Switch traffic to new slot ───────────────
            echo "Switching traffic to $NEW_SLOT..."
            helm upgrade java-web-app helm/java-web-app \
              --namespace ${{ env.NAMESPACE }} \
              --reuse-values \
              --set activeSlot=${NEW_SLOT} \
              --timeout=1m

            # ── Step 6: Scale down old slot ──────────────────────
            echo "Scaling down old $OLD_SLOT slot..."
            helm upgrade java-web-app helm/java-web-app \
              --namespace ${{ env.NAMESPACE }} \
              --reuse-values \
              --set ${OLD_SLOT}.enabled=false \
              --timeout=1m
          fi

      - name: Deployment summary
        run: |
          echo "========================================================"
          echo "  Blue-Green deployment complete!"
          echo "  Cluster   : ${{ env.EKS_CLUSTER }}"
          echo "  Namespace : ${{ env.NAMESPACE }}"
          echo "  Image     : ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          echo "  Helm hist :"
          helm history java-web-app -n ${{ env.NAMESPACE }}
          echo ""
          echo "  Active slot:"
          kubectl get svc java-web-app-svc -n ${{ env.NAMESPACE }} \
            -o jsonpath='slot={.spec.selector.slot}{"\n"}'
          echo ""
          echo "  Running pods:"
          kubectl get pods -n ${{ env.NAMESPACE }} -L slot
          echo ""
          LB=$(kubectl get svc java-web-app-svc -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "  App URL: http://${LB}:8080"
          echo "========================================================"
