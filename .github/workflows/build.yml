name: CI-CD Pipeline

# -----------------------------------------------------------------
# Trigger: runs automatically when a PR is merged into main.
# Direct pushes to main are blocked by branch protection policy.
# Developers must always raise a PR.
# -----------------------------------------------------------------
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------
  # JOB 1: SonarCloud scan
  # ---------------------------------------------------------------
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed by SonarCloud

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Compile (needed for sonar java.binaries)
        run: mvn clean compile -q

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.projectKey=jatinbhalla1991_aprildemo \
            -Dsonar.organization=jatinbhalla1991 \
            -Dsonar.host.url=https://sonarcloud.io

  # ---------------------------------------------------------------
  # JOB 2: Build package and store artifact
  # ---------------------------------------------------------------
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

      - name: Show JAR info
        run: ls -lh target/*.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-web-app-${{ github.run_number }}
          path: target/java-web-app.jar
          retention-days: 30

  # ---------------------------------------------------------------
  # JOB 3: Build Docker image and push to Docker Hub
  # Unique tag = v<run_number>  (increments with every pipeline run)
  # ---------------------------------------------------------------
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR for Docker
        run: mvn clean package -DskipTests -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/assignment:v${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/assignment:latest

      - name: Image summary
        run: |
          echo "Docker image pushed:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/assignment:v${{ github.run_number }}"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/assignment:latest"
